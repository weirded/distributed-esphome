substitutions:
  id_prefix: garage_door_big
  friendly_name: garage-door-big
  display_name: Garage Door (Big)
  uart_tx_pin: D4
  uart_rx_pin: D2
  input_obst_pin: D7
  status_door_pin: D0
  status_obstruction_pin: D8
  dry_contact_open_pin: D5
  dry_contact_close_pin: D6
  dry_contact_light_pin: D3
  name: ${friendly_name}

web_server:

wifi:
  use_address: 192.0.2.181

esphome:
  friendly_name: ${display_name}
  area: Garage
  project:
    name: ratgdo.esphome
    version: "2.0"

esp8266:
  board: d1_mini_lite
  restore_from_flash: true

dashboard_import:
  package_import_url: github://ratgdo/esphome-ratgdo/v2board_esp8266_d1_mini_lite.yaml@main

packages:
  common: !include .common.yaml
  remote_package:
    url: https://github.com/ratgdo/esphome-ratgdo
    files: [base.yaml]
    refresh: 1s

improv_serial: