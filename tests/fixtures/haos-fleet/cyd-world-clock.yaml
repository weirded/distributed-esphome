esphome:
  name: cyd-world-clock
  friendly_name: Office World Clock
  area: Office
  on_boot:
    - light.turn_on:
        id: backlight
        brightness: 100%

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

psram:
  mode: quad

logger:

api:

ota:
  - platform: esphome
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.0.2.71

web_server:
  port: 80

# Fonts
font:
  - file:
      path: fonts/Arimo-Regular.ttf
      type: local
    id: heading_font
    size: 24
    glyphs:
      - " -/:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file:
      path: fonts/Arimo-Regular.ttf
      type: local
    id: date_font
    size: 32
    glyphs:
      - " -/:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"      
  - file:
      path: fonts/JetBrainsMono-Bold.ttf
      type: local
    id: time_font
    size: 54
    glyphs:
      - " :0123456789"

# Images
image:
  - file: images/flag_us.png
    id: flag_us
    resize: 40x21
    type: RGB565
  - file: images/flag_in.png
    id: flag_in
    resize: 40x27
    type: RGB565
  - file: images/flag_eu.png
    id: flag_eu
    resize: 40x27
    type: RGB565

# Colors - Solarized Dark theme
color:
  - id: room_bg_color
    hex: "002b36"  # base03 - darkest background
  - id: timezone_bg_color
    hex: "073642"  # base02 - timezone card background
  - id: timezone_border_color
    hex: "586e75"  # base01 - timezone card border
  - id: default_button_bg_color
    hex: "073642"  # base02
  - id: default_button_pressed_bg_color
    hex: "586e75"  # base01
  - id: clock_color
    hex: "268bd2"  # blue - heading accent
  - id: date_color
    hex: "b58900"  # yellow - date accent
  - id: time_color
    hex: "fdf6e3"  # base3 - daytime time
  - id: time_color_night
    hex: "93a1a1"  # base1 - nighttime time

# Single UTC time source for reliable timezone calculations
time:
  - platform: sntp
    id: utc_time
    timezone: "UTC"
    on_time_sync:
      - logger.log: "UTC time synchronized from NTP"
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# SPI configuration for display - exactly like working example
spi:
  - id: spi_tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

