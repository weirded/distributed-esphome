# Complex ESP32-S3 config with multiple components
# Tests: ESP-IDF build with I2C, SPI, sensors — exercises more of the toolchain
esphome:
  name: compile-test-s3-complex
  friendly_name: "Complex S3 Sensor"
  area: Living Room
  project:
    name: test.compile-suite
    version: "1.0.0"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

web_server:
  port: 80

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

sensor:
  - platform: uptime
    name: "Uptime"

  - platform: internal_temperature
    name: "CPU Temperature"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Restart"
