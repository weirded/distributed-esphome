# SC.3 automation — once a week, regenerate the hash-pinned
# constraints file for the currently-released ESPHome version (plus
# any newer-than-the-newest-committed version we haven't seen yet).
# Opens a PR if anything changed; noop otherwise. Manual trigger via
# workflow_dispatch.

name: Regenerate ESPHome constraints (SC.3)

on:
  schedule:
    # Sundays at 08:00 UTC — ESPHome releases typically drop mid-week,
    # this catches anything from the prior 7 days without flooding
    # Monday-morning inboxes.
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      versions:
        description: "Space-separated ESPHome versions to regenerate (default: latest stable only)"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Determine versions to regenerate
        id: versions
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.versions }}" ]; then
              echo "versions=${{ inputs.versions }}" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          # Default: newest stable release from PyPI that doesn't have a
          # committed constraints file yet. Dev/beta versions are skipped
          # — matches the stable-only regex used by the frontend filter.
          LATEST=$(python3 -c "
          import json, re, urllib.request
          data = json.load(urllib.request.urlopen('https://pypi.org/pypi/esphome/json'))
          stable = [v for v in data['releases'] if re.fullmatch(r'\d+\.\d+\.\d+', v)]
          stable.sort(key=lambda s: tuple(int(x) for x in s.split('.')))
          print(stable[-1])
          ")
          echo "Latest stable ESPHome: $LATEST"
          if [ -f "ha-addon/client/esphome-constraints/${LATEST}.txt" ]; then
              echo "Constraints already committed for ${LATEST} — nothing to do."
              echo "versions=" >> "$GITHUB_OUTPUT"
          else
              echo "versions=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate constraints
        if: steps.versions.outputs.versions != ''
        run: |
          bash scripts/regen-esphome-constraints.sh ${{ steps.versions.outputs.versions }}

      - name: Bump IMAGE_VERSION (if constraints changed)
        if: steps.versions.outputs.versions != ''
        run: |
          set -euo pipefail
          if git diff --quiet -- ha-addon/client/esphome-constraints; then
              echo "No constraints diff — skipping IMAGE_VERSION bump."
              exit 0
          fi
          CUR=$(cat ha-addon/client/IMAGE_VERSION)
          NEXT=$((CUR + 1))
          echo "$NEXT" > ha-addon/client/IMAGE_VERSION
          # Keep MIN_IMAGE_VERSION aligned so workers pulling fresh
          # images have the constraints file and workers on the old
          # image get flagged stale.
          sed -i "s/^MIN_IMAGE_VERSION = .*/MIN_IMAGE_VERSION = \"${NEXT}\"/" ha-addon/server/constants.py

      - name: Create Pull Request
        if: steps.versions.outputs.versions != ''
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          commit-message: "chore(SC.3): regen ESPHome constraints for ${{ steps.versions.outputs.versions }}"
          title: "chore(SC.3): regen ESPHome constraints for ${{ steps.versions.outputs.versions }}"
          body: |
            Auto-generated by `.github/workflows/regen-esphome-constraints.yml`.

            Regenerated hash-pinned constraints file(s) for: **${{ steps.versions.outputs.versions }}**.

            Bumps `ha-addon/client/IMAGE_VERSION` + `MIN_IMAGE_VERSION` so workers
            pulling the new image get the constraints and workers on the
            previous image are flagged stale (they can't auto-update the
            constraints via the source-code overlay — those are data files,
            not `.py` files, so they only reach workers via `docker pull`).

            Review checklist:
            - [ ] Diff of `.txt` looks sane (no unexpected transitive changes).
            - [ ] `grep -E "pyobjc|appnope"` on the new file returns empty (PY-9).
            - [ ] CI green.
          branch: chore/sc3-constraints-${{ steps.versions.outputs.versions }}
          delete-branch: true
