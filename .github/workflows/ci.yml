name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            pytest pytest-asyncio \
            aiohttp aioesphomeapi zeroconf \
            requests \
            mypy types-requests types-PyYAML

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_e2e_client.py -v

      - name: mypy — server
        run: mypy ha-addon/server/ --ignore-missing-imports

      - name: mypy — client
        run: mypy ha-addon/client/ --ignore-missing-imports
