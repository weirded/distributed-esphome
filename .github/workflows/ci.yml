name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            pytest pytest-asyncio \
            aiohttp aioesphomeapi zeroconf \
            requests \
            mypy types-requests types-PyYAML

      - name: Run all tests (unit + e2e)
        run: pytest tests/ -v

      - name: mypy — server
        run: mypy ha-addon/server/ --ignore-missing-imports

      - name: mypy — client
        run: mypy ha-addon/client/ --ignore-missing-imports

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ha-addon/ui/package-lock.json

      - name: Install dependencies
        working-directory: ha-addon/ui
        run: npm ci

      - name: Build frontend
        working-directory: ha-addon/ui
        run: npm run build
