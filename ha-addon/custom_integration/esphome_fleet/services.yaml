# Fleet for ESPHome service descriptors (HI.2).
#
# Two separate device pickers (#66): the top-level `target:` picks one
# or more managed devices to compile (filtered to manufacturer "ESPHome"
# so only target devices show). The `worker` field picks an optional
# build worker to pin the job to (filtered to manufacturer "Fleet for
# ESPHome Worker" so only workers show). This replaces the earlier
# "mix devices + workers in one picker" approach which was confusing.
#
# The explicit `targets` list field stays as an alternative for
# automations that already know the YAML filenames.

compile:
  name: Compile
  description: >
    Compile and OTA-flash firmware for one or more ESPHome devices
    managed by the Fleet add-on.
  # Hassfest rule: ``target:`` must not carry device/entity filter
  # constraints (no ``integration:`` / ``manufacturer:`` keys allowed
  # here). The filtering is still enforced at runtime by
  # ``_resolve_device_ids_to_targets`` which only accepts devices
  # whose identifiers match our DOMAIN. Keep the bare ``target: { }``
  # so the HA service-call UI still shows the Target selector.
  target: {}
  fields:
    worker:
      name: Worker (optional)
      description: >
        Pin the compile to a specific build worker. Leave empty to let
        the scheduler pick an available worker.
      selector:
        device:
          filter:
            - integration: esphome_fleet
              manufacturer: "Fleet for ESPHome Worker"
    targets:
      name: Targets (alternative)
      description: >
        YAML filenames to compile — used when you don't want to pick
        devices from the target selector above. List of filenames
        (e.g. ['living-room.yaml']), or the keyword "all" / "outdated".
        Leave empty when using the device picker.
      selector:
        object:
    tags:
      name: Tags (alternative)
      description: >
        Compile every managed device matching this tag expression —
        useful for "compile every kitchen device" automations. List
        of tag strings (e.g. ['office', 'production']). Combined with
        `tags_op` below. Mutually exclusive with the device picker
        and `targets` (device picker wins, then `tags`, then `targets`).
      example: "['office']"
      selector:
        object:
    tags_op:
      name: Tag match
      description: >
        How to combine the entries in `tags`. `any_of` matches devices
        with at least one of the listed tags (default). `all_of`
        requires every tag. `none_of` matches devices that carry none
        of the listed tags.
      default: any_of
      selector:
        select:
          options:
            - any_of
            - all_of
            - none_of
    esphome_version:
      name: ESPHome version
      description: >
        Optional ESPHome version to compile against (defaults to the
        server's selected version).
      example: "2026.4.0"
      selector:
        text:

cancel:
  name: Cancel
  description: Cancel one or more queued or running compile jobs by id.
  fields:
    job_ids:
      name: Job IDs
      description: List of job UUIDs to cancel.
      required: true
      example: "['12345-abc...']"
      selector:
        object:

validate:
  name: Validate
  description: Run ESPHome config validation against a single target YAML.
  target: {}
  fields:
    target:
      name: Target (alternative)
      description: >
        YAML filename to validate (e.g. living-room.yaml).
        Leave empty when using the device picker.
      selector:
        text:
    tags:
      name: Tags (alternative)
      description: >
        Resolve the validate target via a tag expression instead of
        picking a device or filename. The expression must match a
        single device — multi-match is rejected (validate is single-
        target by API contract).
      example: "['cyd-office-info']"
      selector:
        object:
    tags_op:
      name: Tag match
      description: >
        How to combine the entries in `tags`. Defaults to `any_of`.
      default: any_of
      selector:
        select:
          options:
            - any_of
            - all_of
            - none_of
