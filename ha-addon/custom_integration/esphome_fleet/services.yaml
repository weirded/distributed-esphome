# ESPHome Fleet service descriptors (HI.2).
#
# Surfaces each service to HA's automation editor with field selectors so
# users get autocomplete + validation instead of typing raw YAML.
#
# The compile service supports HA's device-targeting (#37): select one or
# more ESPHome Fleet devices from the device picker → the handler resolves
# them to YAML filenames automatically. The explicit `targets` field is
# kept as a fallback for automations that know the filenames.

compile:
  name: Compile
  description: >
    Compile and OTA-flash firmware for ESPHome devices managed by the
    Fleet add-on. Pick devices AND/OR workers in the target selector:
    device rows become the compile list, worker rows pin the job to
    that specific build worker (#63). Mixing both works.
  target:
    device:
      integration: esphome_fleet
  fields:
    targets:
      name: Targets (alternative)
      description: >
        YAML filenames to compile — used when you don't want to pick
        devices from the target selector above. List of filenames
        (e.g. ['living-room.yaml']), or the keyword "all" / "outdated".
        Leave empty when using the device picker.
      selector:
        object:
    esphome_version:
      name: ESPHome version
      description: Optional ESPHome version to compile against (defaults to the server's selected version).
      example: "2026.3.2"
      selector:
        text:
    worker_id:
      name: Worker client_id (advanced)
      description: >
        #63: prefer picking a Worker device in the target selector
        above — same effect, better UX. This field stays as a manual
        override for automations that want to pin by raw client_id.
      example: "12345-abc..."
      selector:
        text:

cancel:
  name: Cancel
  description: Cancel one or more queued or running compile jobs by id.
  fields:
    job_ids:
      name: Job IDs
      description: List of job UUIDs to cancel.
      required: true
      example: "['12345-abc...']"
      selector:
        object:

validate:
  name: Validate
  description: Run ESPHome config validation against a single target YAML.
  target:
    device:
      integration: esphome_fleet
  fields:
    target:
      name: Target (alternative)
      description: >
        YAML filename to validate (e.g. living-room.yaml).
        Leave empty when using the device picker.
      selector:
        text:
