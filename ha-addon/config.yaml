name: "ESPHome Fleet"
version: "1.4.1-dev.39"
slug: "esphome_dist_server"
description: "Manage fleets of ESPHome devices: distributed compilation, per-device version pinning, scheduled OTA upgrades, and a unified web UI"
url: "https://github.com/weirded/distributed-esphome"
# #10: dropped armhf, armv7, i386 — Supervisor flags them as deprecated, and
# ESPHome compilation is a 64-bit-only game in practice. No real users on
# 32-bit ARM or x86; the toolchains for new ESP32 variants don't ship for them.
arch: [aarch64, amd64]
startup: application
boot: auto
init: true
stage: experimental
homeassistant: "2024.1.0"
codeowners:
  - "@weirded"

# Ingress: Web UI embedded in HA sidebar, authenticated by HA
ingress: true
ingress_port: 8765
panel_icon: mdi:progress-wrench
panel_title: "ESPHome Fleet"

# Direct port: build workers (Docker) connect here with Bearer token auth
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "Build worker API & Web UI"

# mDNS device discovery requires host networking
host_network: true

# Supervisor API access — needed to detect ESPHome add-on version
hassio_api: true
# HA Core REST API access — needed to read entity states (device connectivity)
homeassistant_api: true

# GitHub #45: exclude the local worker's ESPHome version cache + build
# artifacts from HA backups. These are large (~50-200MB per target) and
# fully reproducible — they'll be rebuilt on first compile after restore.
backup_exclude:
  - esphome-versions

map:
  # HI.9: need write access to /config/custom_components/esphome_fleet/
  # for the HA-integration auto-installer (HI.8) at startup. The new
  # `homeassistant_config` key mounts at /homeassistant (NOT /config),
  # which would break every existing `/config/esphome/...` path in the
  # server + scanner. Stick with the old `config:rw` shorthand — it's
  # deprecated but still works, and deprecation-warning is a smaller
  # tax than a full path migration. Revisit when HA removes `config`.
  - config:rw
options:
  token: ""
  job_timeout: 600
  ota_timeout: 120
  worker_offline_threshold: 30
  device_poll_interval: 60
schema:
  token: password
  job_timeout: int
  ota_timeout: int
  worker_offline_threshold: int
  device_poll_interval: int
