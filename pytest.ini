[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: tests that run a real ESPHome compile (slow, requires esphome on PATH)
# The HA integration tests (tests/test_integration_*.py) import the
# `homeassistant` package directly — CI installs it alongside
# `esphome`. We deliberately do NOT use `pytest-homeassistant-custom-
# component`: its global autouse fixtures (pytest_socket + verify_
# cleanup) break every existing server/client test that opens an
# aiohttp loopback listener. Using plain `homeassistant` + MagicMock
# is sufficient for the integration tests we have.
# For parallel test execution, install pytest-xdist and run:
#   pytest -n auto
# CI does this automatically. Not set in addopts because -n auto fails
# when xdist is not installed.
