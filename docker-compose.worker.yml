# Docker Compose file for running a Distributed ESPHome build worker.
#
# Usage:
#   1. Copy this file to the machine that will run the worker
#   2. Edit the environment variables below
#   3. Run: docker compose -f docker-compose.worker.yml up -d
#
# The worker must have network access to your ESP devices for OTA uploads.

name: esphome-worker

services:
  worker:
    image: ghcr.io/weirded/esphome-dist-client:latest
    container_name: distributed-esphome-worker
    restart: unless-stopped
    network_mode: host    # required for OTA access to ESP devices
    environment:
      - SERVER_URL=http://homeassistant.local:8765   # <-- change this
      - SERVER_TOKEN=your-secret-token               # <-- change this
      - MAX_PARALLEL_JOBS=2
      - ESPHOME_SEED_VERSION=2026.3.2                # optional: pre-install this version
      # - HOSTNAME=my-worker                         # optional: override worker name in UI
      # - HOST_PLATFORM=macOS 15.3 (Apple M1 Pro)   # optional: override platform display
    volumes:
      - esphome-versions:/esphome-versions

volumes:
  esphome-versions:
    name: esphome-versions
